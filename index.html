<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>8Impact – Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      margin: 0;
      padding: 0 0 70px;
      transition: background 0.3s, color 0.3s;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 20px;
      text-align: center;
    }

    .logo-badge {
      width: 140px;
      height: 140px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 20%, #fef3c7, #f97316);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 12px 28px rgba(249,115,22,0.35);
      margin: 30px auto;
      animation: pop 0.6s ease-out;
    }

    @keyframes pop {
      0% { transform: scale(0.6); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .logo-badge img {
      width: 100px;
      height: 100px;
      object-fit: contain;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    .menu {
      display: grid;
      gap: 16px;
      margin-top: 30px;
    }

    .menu a {
      display: block;
      padding: 16px;
      border-radius: 14px;
      background: #1e293b;
      color: #e2e8f0;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 600;
      transition: transform 0.2s, background 0.2s;
    }

    .menu a:hover {
      transform: translateY(-3px);
      background: #334155;
    }

    /* Dark mode */
    .dark {
      background: #e2e8f0;
      color: #0f172a;
    }
    .dark .menu a {
      background: #cbd5e1;
      color: #0f172a;
    }
    .dark .menu a:hover {
      background: #94a3b8;
    }
  </style>
</head>
<body>

  <!-- ⭐ TOP HEADER -->
  <header style="
    width:100%;
    background:#0f172a;
    border-bottom:1px solid #1e293b;
    padding:12px 20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    position:sticky;
    top:0;
    z-index:1000;
  ">
    <div style="display:flex; align-items:center; gap:12px;">
      <img src="https://raw.githubusercontent.com/ClarksChallenge/ClarksChallenge/main/octopus.png"
           style="width:48px; height:48px; object-fit:contain;" />
      <span style="color:#e2e8f0; font-size:1.1rem; font-weight:600;">8Impact</span>
    </div>

    <!-- ⭐ Dark mode toggle -->
    <button id="toggle-dark" style="
      background:none;
      border:1px solid #475569;
      padding:6px 12px;
      border-radius:8px;
      color:#e2e8f0;
      cursor:pointer;
    ">Dark</button>
  </header>

  <div class="wrap">
    <div class="logo-badge">
      <img src="https://raw.githubusercontent.com/ClarksChallenge/ClarksChallenge/main/octopus.png" />
    </div>

    <h1>Welcome to 8Impact</h1>
    <p>Support creators by completing surveys — no signup required.</p>

    <div class="menu">
      <a href="support.html">Support a Creator</a>
      <a href="creators.html">View Creators</a>
      <a href="create.html">Create a Fundraiser</a>
      <a href="dashboard.html">Creator Dashboard</a>
      <a href="payouts.html">Payout Transparency</a>
      <a href="privacy.html">Privacy Policy</a>
    </div>
  </div>

  <!-- ⭐ BOTTOM NAV -->
  <nav style="
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#0f172a;
    border-top:1px solid #1e293b;
    display:flex;
    justify-content:space-around;
    padding:10px 0;
    z-index:1000;
  ">
    <a href="index.html" style="color:#cbd5e1; text-decoration:none; font-size:0.85rem;">Home</a>
    <a href="creators.html" style="color:#cbd5e1; text-decoration:none; font-size:0.85rem;">Creators</a>
    <a href="create.html" style="color:#cbd5e1; text-decoration:none; font-size:0.85rem;">Create</a>
    <a href="dashboard.html" style="color:#cbd5e1; text-decoration:none; font-size:0.85rem;">Dashboard</a>
    <a href="payouts.html" style="color:#cbd5e1; text-decoration:none; font-size:0.85rem;">Payouts</a>
  </nav>

  <script>
    // Dark mode toggle
    const btn = document.getElementById("toggle-dark");
    btn.addEventListener("click", () => {
      document.body.classList.toggle("dark");
      btn.textContent = document.body.classList.contains("dark") ? "Light" : "Dark";
    });
  </script>

</body>
</html>
