<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Creator ID</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
    .box {
      background: white; padding: 20px; border-radius: 10px;
      max-width: 400px; margin: auto; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    button {
      padding: 12px; width: 100%; background: #4f46e5; color: white;
      border: none; border-radius: 6px; font-size: 16px; cursor: pointer;
      margin-top: 10px;
    }
    button:hover { background: #4338ca; }
    .result {
      margin-top: 20px; padding: 15px; background: #e0e7ff;
      border-radius: 8px; display: none;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Create Your Creator ID</h2>
  <p>Click the button below to generate your Creator ID and Passphrase.</p>

  <button onclick="generateCreator()">Generate Creator ID</button>

  <div id="result" class="result">
    <p><strong>Your Creator ID:</strong> <span id="cid"></span></p>
    <p><strong>Your Passphrase:</strong> <span id="pass"></span></p>

    <button onclick="copyDashboard()">Copy Dashboard Link</button>
  </div>
</div>

<script>
function generateCreator() {
  const creatorId = "C" + Math.random().toString(36).substring(2, 10).toUpperCase();
  const passphrase = Math.random().toString(36).substring(2, 12);

  document.getElementById("cid").textContent = creatorId;
  document.getElementById("pass").textContent = passphrase;
  document.getElementById("result").style.display = "block";

  fetch("https://script.google.com/macros/s/AKfycbziaO7Zj2BnhtlnI3j7dAPoKKz-SNowp91_vj7ww_4hffbALzCwVHExlqlvLAdRepPWbw/exec?action=createCreator", {
    method: "POST",
    body: new URLSearchParams({ creatorId, passphrase })
  });
}

function copyDashboard() {
  const creatorId = document.getElementById("cid").textContent;
  const link = `https://clarkschallenge.github.io/ClarksChallenge/dashboard.html?id=${creatorId}`;
  navigator.clipboard.writeText(link);
  alert("Dashboard link copied!");
}
</script>

</body>
</html>
