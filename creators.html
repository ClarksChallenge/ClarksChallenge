<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Creators</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .creator {
      padding: 10px; background: #f0f0f0; margin: 10px 0;
      border-radius: 6px;
    }
  </style>
</head>
<body>

<h2>Creators</h2>
<div id="list">Loading...</div>

<script>
fetch("creators.json")
  .then(r => r.json())
  .then(creators => {
    const list = document.getElementById("list");
    list.innerHTML = "";

    creators.forEach(c => {
      list.innerHTML += `
        <div class="creator">
          <strong>${c.name}</strong><br>
          Goal: ${c.goal}<br>
          <a href="${c.link}" target="_blank">Support</a>
        </div>
      `;
    });
  });
</script>

</body>
</html>
