<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Payout Request</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    input { padding: 8px; margin: 5px 0; width: 200px; }
    button { padding: 10px 15px; }
  </style>
</head>
<body>

<h2>Request a Payout</h2>

<label>Creator ID</label><br>
<input id="creatorId" type="text"><br>

<label>Amount</label><br>
<input id="amount" type="number" step="0.01"><br>

<button onclick="submitPayout()">Submit Payout</button>

<script>
function submitPayout() {
  const creatorId = document.getElementById("creatorId").value.trim();
  const amount = document.getElementById("amount").value.trim();

  fetch("https://script.google.com/macros/s/AKfycbziaO7Zj2BnhtlnI3j7dAPoKKz-SNowp91_vj7ww_4hffbALzCwVHExlqlvLAdRepPWbw/exec?action=requestPayout", {
    method: "POST",
    body: new URLSearchParams({ creatorId, amount })
  })
  .then(() => alert("Payout submitted!"));
}
</script>

</body>
</html>
